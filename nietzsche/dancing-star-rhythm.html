<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dancing Star</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; font-family: Georgia, serif; }
  canvas { display: block; }
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; flex-direction: column; color: #d4af37; z-index: 10; text-align: center; }
  #overlay h1 { font-size: 52px; text-shadow: 0 0 30px #d4af37; margin-bottom: 15px; }
  #overlay p { font-size: 18px; color: #888; margin: 5px 20px; font-style: italic; }
  #overlay .keys { font-size: 28px; color: #0ff; margin: 20px; letter-spacing: 20px; font-style: normal; }
  #overlay button { margin-top: 25px; padding: 15px 40px; font-size: 20px; background: transparent; border: 2px solid #d4af37; color: #d4af37; cursor: pointer; font-family: Georgia; }
  #overlay button:hover { background: #d4af37; color: #000; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>⭐ Dancing Star</h1>
  <p>"One must still have chaos in oneself</p>
  <p>to give birth to a dancing star."</p>
  <div class="keys">D F J K</div>
  <p style="color:#aaa; font-style:normal">Hit the notes as they reach the line</p>
  <button onclick="startGame()">Begin</button>
</div>
<script>
const C = document.getElementById('c');
const X = C.getContext('2d');
let W, H;
function resize() { W = C.width = innerWidth; H = C.height = innerHeight; }
resize();
addEventListener('resize', resize);

const LANE_KEYS = ['d','f','j','k'];
const LANE_COLORS = ['#ff0066','#00ff88','#0088ff','#ffcc00'];
let state = 'menu';

// Audio context for procedural music
let audioCtx;
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, duration, type='sine') {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function playHit(lane) {
  const freqs = [261.63, 329.63, 392.00, 523.25];
  playTone(freqs[lane], 0.3, 'triangle');
}
function playMiss() { playTone(100, 0.2, 'sawtooth'); }

let notes, score, combo, maxCombo, misses, hitLine, laneWidth, laneX;
let constellationStars, bgStars, particles, beatTimer, bpm, beatInterval;
let gameStartTime, gameDuration, noteSpeed;
let keyFlash = [0,0,0,0];

function startGame() {
  initAudio();
  document.getElementById('overlay').style.display = 'none';
  
  laneWidth = Math.min(80, W / 6);
  const totalLaneWidth = laneWidth * 4 + 30;
  laneX = (W - totalLaneWidth) / 2;
  hitLine = H - 100;
  noteSpeed = 3;
  
  notes = [];
  score = 0; combo = 0; maxCombo = 0; misses = 0;
  constellationStars = [];
  particles = [];
  beatTimer = 0;
  bpm = 120;
  beatInterval = 60000 / bpm;
  gameDuration = 120000; // 2 minutes
  gameStartTime = performance.now();
  
  // Pre-generate note pattern
  const totalBeats = Math.floor(gameDuration / beatInterval);
  for (let i = 4; i < totalBeats; i++) {
    if (Math.random() < 0.7) { // 70% chance per beat
      const lane = Math.floor(Math.random() * 4);
      const wobble = (Math.random() - 0.5) * 30; // chaos wobble
      notes.push({
        lane, time: i * beatInterval,
        y: -50, wobble, wobblePhase: Math.random() * Math.PI * 2,
        active: true, hit: false
      });
    }
    // Occasional double notes
    if (Math.random() < 0.15 && i > 10) {
      const l1 = Math.floor(Math.random() * 4);
      let l2 = (l1 + 1 + Math.floor(Math.random() * 3)) % 4;
      notes.push({ lane: l2, time: i * beatInterval, y: -50, wobble: (Math.random()-0.5)*20, wobblePhase: Math.random()*Math.PI*2, active: true, hit: false });
    }
  }
  
  bgStars = [];
  for (let i = 0; i < 150; i++) bgStars.push({ x: Math.random()*W, y: Math.random()*H, s: Math.random()*2+0.5, b: Math.random() });
  
  state = 'play';
}

addEventListener('keydown', e => {
  const idx = LANE_KEYS.indexOf(e.key.toLowerCase());
  if (idx === -1 || state !== 'play') return;
  keyFlash[idx] = 1;
  
  // Find closest hittable note in this lane
  let best = null, bestDist = Infinity;
  for (const n of notes) {
    if (!n.active || n.hit || n.lane !== idx) continue;
    const dist = Math.abs(n.y - hitLine);
    if (dist < 60 && dist < bestDist) { best = n; bestDist = dist; }
  }
  
  if (best) {
    best.hit = true;
    best.active = false;
    combo++;
    maxCombo = Math.max(maxCombo, combo);
    
    const perfect = bestDist < 15;
    const great = bestDist < 30;
    score += perfect ? 100 * (1 + combo * 0.1) : great ? 50 * (1 + combo * 0.05) : 25;
    
    playHit(idx);
    
    // Particle burst
    const nx = getLaneCenter(idx);
    for (let i = 0; i < (perfect ? 15 : 8); i++) {
      const a = Math.random() * Math.PI * 2;
      const spd = 2 + Math.random() * 4;
      particles.push({ x: nx, y: hitLine, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 2, life: 1, color: LANE_COLORS[idx] });
    }
    
    // Add constellation star
    if (combo % 5 === 0 || perfect) {
      constellationStars.push({ x: W * 0.3 + Math.random() * W * 0.4, y: 30 + Math.random() * 120, r: 2 + Math.random() * 3, born: performance.now() });
    }
  } else {
    combo = 0;
    misses++;
    playMiss();
  }
});

addEventListener('keyup', e => {
  const idx = LANE_KEYS.indexOf(e.key.toLowerCase());
  if (idx >= 0) keyFlash[idx] = 0;
});

function getLaneCenter(i) { return laneX + i * (laneWidth + 10) + laneWidth / 2; }

function update(now) {
  const elapsed = now - gameStartTime;
  
  // Update notes
  for (const n of notes) {
    if (!n.active) continue;
    const timeUntilHit = n.time - elapsed;
    n.y = hitLine - (timeUntilHit / 1000) * noteSpeed * 60;
    
    // Chaos wobble
    n.wobblePhase += 0.03;
    const chaosReduction = Math.min(combo / 30, 0.8); // Higher combo = less chaos
    n.currentWobble = n.wobble * Math.sin(n.wobblePhase) * (1 - chaosReduction);
    
    // Missed
    if (n.y > hitLine + 80) {
      n.active = false;
      combo = 0;
      misses++;
    }
  }
  
  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= 0.02;
    if (p.life <= 0) particles.splice(i, 1);
  }
  
  // Key flash decay
  for (let i = 0; i < 4; i++) if (keyFlash[i] > 0) keyFlash[i] = Math.max(0, keyFlash[i] - 0.05);
  
  // Game over
  if (elapsed > gameDuration) {
    state = 'end';
    showEnd();
  }
}

function showEnd() {
  const starCount = constellationStars.length;
  const rating = starCount > 20 ? 'A DANCING STAR IS BORN' : starCount > 10 ? 'The Star Glimmers' : 'The Star Flickers';
  const ol = document.getElementById('overlay');
  ol.innerHTML = `<h1>⭐ ${rating}</h1><p style="color:#d4af37; font-size:24px">Score: ${Math.floor(score)}</p><p>Max Combo: ${maxCombo} | Stars: ${starCount} | Misses: ${misses}</p><button onclick="startGame()">Dance Again</button>`;
  ol.style.display = 'flex';
}

function draw(now) {
  if (state === 'play') update(now);
  
  X.clearRect(0, 0, W, H);
  
  // Nebula background
  const bg = X.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.7);
  bg.addColorStop(0, '#0a0020');
  bg.addColorStop(0.5, '#05001a');
  bg.addColorStop(1, '#000');
  X.fillStyle = bg;
  X.fillRect(0, 0, W, H);
  
  // Background stars
  for (const s of bgStars) {
    const b = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(now / 1000 + s.b * 10));
    X.globalAlpha = b;
    X.fillStyle = '#aaccff';
    X.beginPath();
    X.arc(s.x, s.y, s.s, 0, Math.PI * 2);
    X.fill();
  }
  X.globalAlpha = 1;
  
  // Beat pulse
  if (state === 'play') {
    const elapsed = now - gameStartTime;
    const beatPhase = (elapsed % beatInterval) / beatInterval;
    if (beatPhase < 0.1) {
      X.fillStyle = `rgba(255,255,255,${0.03 * (1 - beatPhase / 0.1)})`;
      X.fillRect(0, 0, W, H);
    }
  }
  
  if (state !== 'play' && state !== 'end') { requestAnimationFrame(draw); return; }
  
  // Lanes
  for (let i = 0; i < 4; i++) {
    const cx = getLaneCenter(i);
    const flash = keyFlash[i];
    
    // Lane pillar
    X.globalAlpha = 0.1 + flash * 0.2;
    X.fillStyle = LANE_COLORS[i];
    X.fillRect(cx - laneWidth/2, 0, laneWidth, H);
    X.globalAlpha = 1;
    
    // Hit zone
    X.fillStyle = `rgba(255,255,255,${0.15 + flash * 0.3})`;
    X.fillRect(cx - laneWidth/2, hitLine - 5, laneWidth, 10);
    
    // Key label
    X.fillStyle = `rgba(255,255,255,${0.4 + flash * 0.6})`;
    X.font = `${20 + flash * 8}px Georgia`;
    X.textAlign = 'center';
    X.fillText(LANE_KEYS[i].toUpperCase(), cx, H - 30);
  }
  
  // Notes
  for (const n of notes) {
    if (!n.active || n.y < -30 || n.y > H + 30) continue;
    const cx = getLaneCenter(n.lane) + (n.currentWobble || 0);
    const nearHit = Math.abs(n.y - hitLine) < 30;
    const r = nearHit ? 16 : 12;
    
    // Glow
    X.globalAlpha = 0.3;
    X.fillStyle = LANE_COLORS[n.lane];
    X.beginPath();
    X.arc(cx, n.y, r * 2, 0, Math.PI * 2);
    X.fill();
    
    // Note body (chaotic fractal-ish shape)
    X.globalAlpha = 0.9;
    X.fillStyle = LANE_COLORS[n.lane];
    X.beginPath();
    const spikes = 5 + Math.floor(Math.sin(n.wobblePhase * 3) * 2);
    for (let s = 0; s < spikes * 2; s++) {
      const angle = (s / (spikes * 2)) * Math.PI * 2;
      const rad = s % 2 === 0 ? r : r * 0.5;
      const px = cx + Math.cos(angle + n.wobblePhase) * rad;
      const py = n.y + Math.sin(angle + n.wobblePhase) * rad;
      s === 0 ? X.moveTo(px, py) : X.lineTo(px, py);
    }
    X.closePath();
    X.fill();
    X.globalAlpha = 1;
  }
  
  // Particles
  for (const p of particles) {
    X.globalAlpha = p.life;
    X.fillStyle = p.color;
    X.beginPath();
    X.arc(p.x, p.y, 2 + p.life * 3, 0, Math.PI * 2);
    X.fill();
  }
  X.globalAlpha = 1;
  
  // Constellation at top
  for (let i = 0; i < constellationStars.length; i++) {
    const s = constellationStars[i];
    const age = Math.min((now - s.born) / 500, 1);
    X.globalAlpha = age;
    X.fillStyle = '#ffd700';
    X.beginPath();
    X.arc(s.x, s.y, s.r * age, 0, Math.PI * 2);
    X.fill();
    // Connect to nearby stars
    if (i > 0) {
      const prev = constellationStars[i - 1];
      const d = Math.hypot(s.x - prev.x, s.y - prev.y);
      if (d < 150) {
        X.strokeStyle = `rgba(255,215,0,${age * 0.3})`;
        X.lineWidth = 1;
        X.beginPath();
        X.moveTo(s.x, s.y);
        X.lineTo(prev.x, prev.y);
        X.stroke();
      }
    }
  }
  X.globalAlpha = 1;
  
  // HUD
  X.fillStyle = '#d4af37';
  X.font = '20px Georgia';
  X.textAlign = 'left';
  X.fillText(`Score: ${Math.floor(score)}`, 15, 30);
  X.fillText(`Combo: ${combo}x`, 15, 55);
  
  if (state === 'play') {
    const elapsed = now - gameStartTime;
    const remaining = Math.max(0, gameDuration - elapsed);
    X.textAlign = 'right';
    X.fillText(`${Math.ceil(remaining / 1000)}s`, W - 15, 30);
    X.fillText(`Stars: ${constellationStars.length}`, W - 15, 55);
  }
  
  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
