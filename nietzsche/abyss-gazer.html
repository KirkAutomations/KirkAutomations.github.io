<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Abyss Gazer</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; flex-direction: column; color: #0ff; font-family: Georgia, serif; z-index: 10; }
  #overlay h1 { font-size: 48px; margin-bottom: 20px; text-shadow: 0 0 20px #0ff; }
  #overlay p { font-size: 20px; color: #888; margin: 5px; font-style: italic; }
  #overlay button { margin-top: 30px; padding: 15px 40px; font-size: 20px; background: transparent; border: 2px solid #0ff; color: #0ff; cursor: pointer; font-family: Georgia; }
  #overlay button:hover { background: #0ff; color: #000; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>Abyss Gazer</h1>
  <p>"If you gaze long into an abyss,</p>
  <p>the abyss gazes also into you."</p>
  <p style="color:#555; margin-top:15px">— Friedrich Nietzsche</p>
  <p style="color:#0ff; margin-top:20px; font-style:normal">Move your gaze. Collect the truth. Don't stare too long.</p>
  <button onclick="startGame()">Gaze Into the Abyss</button>
</div>
<script>
const C = document.getElementById('c');
const X = C.getContext('2d');
let W, H;
function resize() { W = C.width = innerWidth; H = C.height = innerHeight; }
resize();
addEventListener('resize', resize);

const nietzscheQuotes = [
  'GOD IS DEAD',
  'BECOME WHO YOU ARE',
  'AMOR FATI',
  'THE ETERNAL RETURN',
  'WILL TO POWER',
  'DANCING STAR',
  'BEYOND GOOD AND EVIL',
  'THUS SPOKE ZARATHUSTRA',
];

let mx = W/2, my = H/2;
addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

let state = 'menu';
let level, sanity, fragments, collected, tendrils, eyeOpenness, eyeAngle, distortTimer;
let whispers = [], pullStrength, abyssRadius;

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  level = 1;
  sanity = 100;
  startLevel();
  state = 'play';
}

function startLevel() {
  const quote = nietzscheQuotes[(level - 1) % nietzscheQuotes.length];
  fragments = [];
  collected = [];
  tendrils = [];
  eyeOpenness = 0;
  distortTimer = 0;
  pullStrength = 0.3 + level * 0.15;
  abyssRadius = 60 + level * 10;
  
  const letters = quote.split('');
  for (let i = 0; i < letters.length; i++) {
    const angle = (i / letters.length) * Math.PI * 2 + Math.random() * 0.5;
    const dist = 150 + Math.random() * 200 + level * 20;
    fragments.push({
      char: letters[i],
      angle,
      dist,
      baseAngle: angle,
      baseDist: dist,
      x: W/2 + Math.cos(angle) * dist,
      y: H/2 + Math.sin(angle) * dist,
      collected: false,
      glow: Math.random() * Math.PI * 2
    });
  }
  
  // Spawn tendrils for higher levels
  for (let i = 0; i < level; i++) {
    tendrils.push({
      angle: Math.random() * Math.PI * 2,
      length: 0,
      maxLength: 150 + Math.random() * 200,
      speed: 0.5 + Math.random() * 0.5,
      width: 3 + Math.random() * 5,
      phase: Math.random() * Math.PI * 2,
      active: false,
      cooldown: 60 + Math.floor(Math.random() * 120)
    });
  }
}

function update() {
  if (state !== 'play') return;
  
  const cx = W/2, cy = H/2;
  const distToCenter = Math.hypot(mx - cx, my - cy);
  
  // Pull toward abyss
  if (distToCenter < 300) {
    const pull = pullStrength * (1 - distToCenter / 300);
    // Don't actually move cursor, but affect sanity
    sanity -= pull * 0.05;
  }
  
  // Sanity drain near abyss
  if (distToCenter < abyssRadius + 50) {
    sanity -= 0.2 * level;
  }
  
  // Eye tracks cursor
  eyeAngle = Math.atan2(my - cy, mx - cx);
  eyeOpenness = Math.min(1, eyeOpenness + (distToCenter < 250 ? 0.01 * level : -0.005));
  
  // Orbit fragments
  for (const f of fragments) {
    if (f.collected) continue;
    f.angle += 0.005 + level * 0.002;
    f.glow += 0.05;
    f.x = cx + Math.cos(f.angle) * f.dist;
    f.y = cy + Math.sin(f.angle) * f.dist;
    
    // Collect
    if (Math.hypot(mx - f.x, my - f.y) < 20) {
      f.collected = true;
      collected.push(f.char);
      sanity = Math.min(100, sanity + 3);
    }
  }
  
  // Update tendrils
  for (const t of tendrils) {
    if (!t.active) {
      t.cooldown--;
      if (t.cooldown <= 0) { t.active = true; t.angle = Math.atan2(my - cy, mx - cx) + (Math.random() - 0.5) * 0.5; }
    } else {
      t.length += t.speed * 3;
      t.phase += 0.1;
      if (t.length > t.maxLength) {
        t.active = false;
        t.length = 0;
        t.cooldown = 60 + Math.floor(Math.random() * 120);
      }
      // Collision with cursor
      const tx = cx + Math.cos(t.angle) * t.length;
      const ty = cy + Math.sin(t.angle) * t.length;
      if (Math.hypot(mx - tx, my - ty) < 30) {
        sanity -= 5;
        t.active = false;
        t.length = 0;
        t.cooldown = 120;
      }
    }
  }
  
  // Whispers
  if (sanity < 60 && Math.random() < 0.02 * (1 - sanity / 60)) {
    const words = ['nothing', 'void', 'meaning?', 'return', 'alone', 'darkness', 'forever', 'gaze', 'abyss'];
    whispers.push({
      text: words[Math.floor(Math.random() * words.length)],
      x: Math.random() * W,
      y: Math.random() * H,
      life: 1,
      size: 12 + Math.random() * 24
    });
  }
  for (let i = whispers.length - 1; i >= 0; i--) {
    whispers[i].life -= 0.01;
    if (whispers[i].life <= 0) whispers.splice(i, 1);
  }
  
  distortTimer++;
  
  // Level complete
  if (fragments.every(f => f.collected)) {
    level++;
    if (level > 5) {
      state = 'win';
      showEnd('You Have Gazed Into the Abyss', `And emerged. Sanity: ${Math.floor(sanity)}%`);
    } else {
      startLevel();
    }
  }
  
  // Death
  if (sanity <= 0) {
    state = 'dead';
    showEnd('The Abyss Consumed You', `Reached Level ${level}. The void gazes back.`);
  }
}

function showEnd(title, sub) {
  const ol = document.getElementById('overlay');
  ol.innerHTML = `<h1>${title}</h1><p>${sub}</p><button onclick="location.reload()">Gaze Again</button>`;
  ol.style.display = 'flex';
}

function draw() {
  X.clearRect(0, 0, W, H);
  const cx = W/2, cy = H/2;
  
  // Distortion effect
  if (sanity < 50 && state === 'play') {
    const intensity = (50 - sanity) / 50;
    X.save();
    X.translate(cx, cy);
    X.rotate(Math.sin(distortTimer * 0.02) * intensity * 0.02);
    X.scale(1 + Math.sin(distortTimer * 0.03) * intensity * 0.01, 1 + Math.cos(distortTimer * 0.04) * intensity * 0.01);
    X.translate(-cx, -cy);
  }
  
  // Background pulse
  const pulse = 0.03 + (state === 'play' ? (100 - sanity) / 100 * 0.05 : 0);
  const bgBright = Math.floor(15 + Math.sin(Date.now() / 1000) * 5);
  X.fillStyle = `rgb(${bgBright},0,${bgBright * 2})`;
  X.fillRect(0, 0, W, H);
  
  // Abyss
  const grad = X.createRadialGradient(cx, cy, 0, cx, cy, abyssRadius * 3);
  grad.addColorStop(0, 'rgba(0,0,0,1)');
  grad.addColorStop(0.3, 'rgba(5,0,15,0.9)');
  grad.addColorStop(0.6, 'rgba(10,0,20,0.5)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  X.fillStyle = grad;
  X.beginPath();
  X.arc(cx, cy, abyssRadius * 3, 0, Math.PI * 2);
  X.fill();
  
  // Swirling void
  for (let i = 0; i < 8; i++) {
    const a = (Date.now() / 2000 + i * Math.PI / 4) % (Math.PI * 2);
    const r = abyssRadius * (0.5 + 0.3 * Math.sin(Date.now() / 1000 + i));
    X.strokeStyle = `rgba(80,20,140,${0.4 + 0.2 * Math.sin(i)})`;
    X.lineWidth = 2;
    X.beginPath();
    X.arc(cx, cy, r, a, a + Math.PI * 0.5);
    X.stroke();
  }
  
  // Eye in the abyss
  if (eyeOpenness > 0.05) {
    const er = abyssRadius * 0.6;
    const irisR = er * 0.4 * eyeOpenness;
    
    // Eye white
    X.fillStyle = `rgba(200,200,255,${eyeOpenness * 0.6})`;
    X.save();
    X.translate(cx, cy);
    X.scale(1, eyeOpenness * 0.5);
    X.beginPath();
    X.arc(0, 0, er, 0, Math.PI * 2);
    X.fill();
    X.restore();
    
    // Iris
    const irisX = cx + Math.cos(eyeAngle) * er * 0.2;
    const irisY = cy + Math.sin(eyeAngle) * er * 0.2 * eyeOpenness * 0.5;
    X.fillStyle = `rgba(100,0,200,${eyeOpenness * 0.8})`;
    X.beginPath();
    X.arc(irisX, irisY, irisR, 0, Math.PI * 2);
    X.fill();
    
    // Pupil
    X.fillStyle = `rgba(0,0,0,${eyeOpenness})`;
    X.beginPath();
    X.arc(irisX, irisY, irisR * 0.5, 0, Math.PI * 2);
    X.fill();
  }
  
  // Tendrils
  for (const t of tendrils) {
    if (!t.active || t.length < 5) continue;
    X.strokeStyle = `rgba(80,0,120,0.4)`;
    X.lineWidth = t.width;
    X.beginPath();
    X.moveTo(cx, cy);
    const segments = 10;
    for (let i = 1; i <= segments; i++) {
      const frac = i / segments;
      const r = t.length * frac;
      const wobble = Math.sin(t.phase + frac * 5) * 20 * frac;
      const perpAngle = t.angle + Math.PI / 2;
      const px = cx + Math.cos(t.angle) * r + Math.cos(perpAngle) * wobble;
      const py = cy + Math.sin(t.angle) * r + Math.sin(perpAngle) * wobble;
      X.lineTo(px, py);
    }
    X.stroke();
  }
  
  // Fragments
  for (const f of fragments) {
    if (f.collected) continue;
    const glow = 0.5 + 0.5 * Math.sin(f.glow);
    X.globalAlpha = 0.6 + 0.4 * glow;
    X.fillStyle = '#0ff';
    X.beginPath();
    X.arc(f.x, f.y, 15, 0, Math.PI * 2);
    X.fill();
    X.globalAlpha = 1;
    X.fillStyle = `rgba(0,255,255,${0.7 + 0.3 * glow})`;
    X.font = 'bold 16px Georgia';
    X.textAlign = 'center';
    X.textBaseline = 'middle';
    X.fillText(f.char, f.x, f.y);
  }
  
  // Collected quote
  if (collected.length > 0) {
    X.fillStyle = '#d4af37';
    X.font = '24px Georgia';
    X.textAlign = 'center';
    X.fillText(collected.join(''), W/2, H - 40);
  }
  
  // Whispers
  for (const w of whispers) {
    X.globalAlpha = w.life * 0.5;
    X.fillStyle = sanity < 30 ? '#f00' : '#666';
    X.font = `${w.size}px Georgia`;
    X.textAlign = 'center';
    X.fillText(w.text, w.x, w.y);
  }
  X.globalAlpha = 1;
  
  // Cursor gaze
  X.fillStyle = `rgba(0,255,255,0.8)`;
  X.beginPath();
  X.arc(mx, my, 6, 0, Math.PI * 2);
  X.fill();
  X.strokeStyle = `rgba(0,255,255,0.3)`;
  X.lineWidth = 1;
  X.beginPath();
  X.arc(mx, my, 25, 0, Math.PI * 2);
  X.stroke();
  
  // Sanity bar
  if (state === 'play') {
    X.fillStyle = '#222';
    X.fillRect(W - 220, 15, 204, 24);
    const sanityColor = sanity > 60 ? '#0ff' : sanity > 30 ? '#ff0' : '#f00';
    X.fillStyle = sanityColor;
    X.fillRect(W - 218, 17, sanity * 2, 20);
    X.fillStyle = '#888';
    X.font = '14px Georgia';
    X.textAlign = 'right';
    X.fillText(`Sanity: ${Math.floor(sanity)}%`, W - 20, 55);
    X.fillText(`Level ${level}/5`, W - 20, 75);
  }
  
  if (sanity < 50 && state === 'play') X.restore();
  
  update();
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
